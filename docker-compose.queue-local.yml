services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: alt-expert-web:latest
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
    restart: unless-stopped

  parser-worker:
    image: alt-expert-web:latest
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
      - ./parser:/app/parser
    command: ["python", "-m", "app.workers.parser_worker"]
    restart: unless-stopped

  content-worker:
    image: alt-expert-web:latest
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
    command: ["python", "-m", "app.workers.content_worker"]
    restart: unless-stopped

volumes:
  redis_data:

