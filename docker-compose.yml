services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: alt-expert-web:latest
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # Нужно для /talk: доступ контейнера к портам хоста (SSH reverse tunnel и т.п.)
    # Используйте URL вида: http://host.docker.internal:19010/talk
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # persist runtime artifacts (KB updates, snapshots, published content)
      - ./data:/app/data
      # persist knowledge base edits done by parser
      - ./knowledge_base:/app/knowledge_base
    restart: unless-stopped

  parser-worker:
    image: alt-expert-web:latest
    env_file:
      - .env
    depends_on:
      - redis
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
      - ./parser:/app/parser
    command: ["python", "-m", "app.workers.parser_worker"]
    restart: unless-stopped

  content-worker:
    image: alt-expert-web:latest
    env_file:
      - .env
    depends_on:
      - redis
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
    command: ["python", "-m", "app.workers.content_worker"]
    restart: unless-stopped

  # Optional: daily parser runner (manual trigger by default).
  # For production scheduling, prefer host systemd timer (deploy/systemd/alt-parser.*)
  parser:
    image: alt-expert-web:latest
    env_file:
      - .env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./data:/app/data
      - ./knowledge_base:/app/knowledge_base
      - ./parser:/app/parser
    entrypoint: ["python", "-m", "app.parser_agent.cli"]
    restart: "no"
    profiles: ["ops"]

volumes:
  redis_data:

