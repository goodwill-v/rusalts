{% extends "base.html" %}
{% block body %}
<header class="topbar">
  <h1 class="brand">АЛТ‑эксперт</h1>
  <p class="tagline">Консультант по российским мессенджерам, социальным сетям и профильному законодательству.</p>
</header>

<main class="grid-main">
  <section class="panel chat-panel" aria-labelledby="chat-heading">
    <h2 id="chat-heading">Диалог</h2>
    <div id="chat-log" class="chat-log" role="log" aria-live="polite"></div>
    <form id="chat-form" class="chat-form">
      <label class="sr-only" for="question">Ваш вопрос</label>
      <textarea id="question" name="question" rows="3" placeholder="Введите вопрос…" required></textarea>
      <div class="chat-actions">
        <label class="file-pill" title="Загрузка файла">
          <input type="file" id="attachment" name="attachment" title="Загрузка файла" aria-label="Загрузка файла" />
          <span>Прикрепить</span>
        </label>
        <span class="file-names" data-file-names aria-live="polite"></span>
        <button type="submit" class="btn primary">Отправить</button>
      </div>
      <p id="upload-hint" class="hint" hidden></p>
    </form>
  </section>

  <section class="panel templates-panel" aria-labelledby="tpl-heading">
    <h2 id="tpl-heading">Шаблоны документов</h2>
    <ul id="template-list" class="template-list"></ul>
    <p id="templates-empty" class="muted" hidden>Шаблоны пока не загружены в каталог <code>templates/document_templates</code>.</p>
  </section>
</main>
{% endblock %}
