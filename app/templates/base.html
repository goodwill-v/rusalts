<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }}</title>
  {# Use relative /static URLs to avoid mixed-content issues behind reverse proxy. #}
  <link rel="stylesheet" href="/static/css/app.css" />
  {% if is_widget %}
  <meta name="widget-mode" content="vk" />
  {% endif %}
</head>
<body class="{{ layout_class if layout_class else ('layout-widget' if is_widget else 'layout-app') }}">
  <div class="shell">
    {% block body %}{% endblock %}
  </div>
  <script>
    window.__APP__ = {
      vkAppId: {{ vk_app_id | tojson }},
      isWidget: {{ is_widget | tojson }},
      baseUrl: {{ request.base_url | string | tojson }}
    };
  </script>
  {% block vk_bridge %}{% endblock %}
  <script type="module" src="/static/js/app.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
